<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后湖片区配套设施现状分析</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#F0F4F8;color:#333;overflow:hidden}
.container{display:flex;height:100vh}
#map{flex:1;height:100vh}

/* 顶部分类切换栏 */
.top-bar{position:fixed;top:0;left:0;right:400px;z-index:1000;background:rgba(240,244,248,0.95);display:flex;padding:10px 20px;gap:10px;border-bottom:1px solid #d0d8e0;backdrop-filter:blur(10px)}
.category-btn{padding:8px 16px;border:2px solid;border-radius:25px;background:transparent;color:#666;cursor:pointer;font-size:13px;font-weight:bold;transition:all .3s;font-family:inherit}
.category-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.category-btn.active{color:#fff!important;box-shadow:0 4px 15px rgba(0,0,0,.15)}
.toggle-all-btn{padding:8px 16px;border:2px solid #aaa;border-radius:25px;background:transparent;color:#777;cursor:pointer;font-size:13px;font-family:inherit}
.toggle-all-btn:hover{border-color:#FF6B35;color:#FF6B35}

/* 侧边栏 */
.sidebar{position:fixed;top:0;right:0;width:400px;height:100vh;padding:20px;overflow-y:auto;background:#F0F4F8;border-left:1px solid #d0d8e0;z-index:999}
h1{font-size:20px;color:#FF6B35;margin-top:55px;margin-bottom:3px}
.subtitle{font-size:13px;color:#777;margin-bottom:15px}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:15px}
.stat-card{background:#fff;border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all .3s;border:2px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.stat-card.active{border-color:var(--cat-color)}
.stat-num{font-size:24px;font-weight:bold;color:#FF6B35}
.stat-label{font-size:12px;color:#777;margin-top:3px}

/* 分析面板 */
.analysis-panel{background:#fff;border-radius:10px;padding:15px;margin-bottom:12px;display:none;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.analysis-panel.active{display:block}
.analysis-panel h3{font-size:15px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
.analysis-item{padding:4px 0;font-size:12px;color:#555}
.analysis-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px;color:#fff}

/* 设施列表 */
.list-header{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:#999;border-bottom:1px solid #ddd}
.facility-list{max-height:250px;overflow-y:auto;margin-bottom:10px}
.facility-item{display:flex;align-items:center;padding:5px 8px;border-bottom:1px solid #eee;font-size:12px;cursor:pointer;border-radius:4px}
.facility-item:hover{background:rgba(255,107,53,0.08)}
.facility-dot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0}
.facility-icon{font-size:14px;margin-right:6px}
.facility-type{font-size:10px;color:#888;margin-left:auto;padding:1px 6px;border-radius:3px;background:#eef2f6}

/* 地图自定义控件 */
.map-legend{background:rgba(255,255,255,0.95);padding:10px 14px;border-radius:8px;border:1px solid #d0d8e0;font-size:12px;color:#444;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.map-legend b{color:#FF6B35;display:block;margin-bottom:5px}
.legend-row{display:flex;align-items:center;gap:6px;padding:2px 0}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* 服务半径标记 */
.radius-toggle{position:fixed;bottom:20px;left:20px;z-index:1000;padding:8px 16px;border:1px solid #FF6B35;border-radius:20px;background:rgba(255,255,255,0.92);color:#FF6B35;cursor:pointer;font-size:12px;font-family:inherit;backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.radius-toggle:hover{background:#FF6B35;color:#fff}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c0c8d0;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#a0a8b0}

/* 加载动画 */
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:#F0F4F8;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:15px}
.loading-spinner{width:40px;height:40px;border:3px solid #d0d8e0;border-top-color:#FF6B35;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#888;font-size:14px}
</style>
</head>

<div id="map"></div>

const CATEGORY_KEYS = ["education", "medical", "commercial", "transport", "culture"];
const CATEGORIES = {"education": {"label": "教育科研设施", "icon": "🏫", "color": "#4CAF50", "radius": 500}, "medical": {"label": "医疗卫生设施", "icon": "🏥", "color": "#F44336", "radius": 1000}, "commercial": {"label": "商业服务设施", "icon": "🛒", "color": "#FF9800", "radius": 300}, "transport": {"label": "交通设施", "icon": "🚇", "color": "#2196F3", "radius": 400}, "culture": {"label": "文化体育设施", "icon": "🎭", "color": "#9C27B0", "radius": 800}};

let map, activeCategory = null, radiusLayers = [], showRadius = false;
let markersByCategory = {}, markerLayer = null;

function init() {
    map = L.map('map', {
        center: [28.1639, 112.9398],
        zoom: 15,
        zoomControl: true,
        attributionControl: false,
    });
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);
    
    // 研究范围边界
    L.rectangle([[28.152, 112.926], [28.175, 112.954]], {
        color: '#FF6B35', weight: 2, fill: false, dashArray: '8,6'
    }).addTo(map);
    
    // 后湖湖面（手动标注）
    L.circle([28.1639, 112.9398], {radius: 400, color: '#2196F3', fillColor: '#1976D2', fillOpacity: 0.15, weight: 1}).addTo(map);
    
    buildUI();
    buildMapLayers();
    
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
    }, 500);
}

function buildUI() {
    const topBar = document.getElementById('topBar');
    const statGrid = document.getElementById('statGrid');
    const panels = document.getElementById('analysisPanels');
    const list = document.getElementById('facilityList');
    
    // 顶部按钮
    CATEGORY_KEYS.forEach((key, i) => {
        const cat = CATEGORIES[key];
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.textContent = cat.icon + ' ' + cat.label;
        btn.style.borderColor = cat.color;
        btn.style.color = cat.color;
        btn.onclick = () => toggleCategory(key);
        btn.dataset.key = key;
        topBar.appendChild(btn);
    });
    
    // 统计卡片
    CATEGORY_KEYS.forEach(key => {
        const st = DATA.stats[key];
        const card = document.createElement('div');
        card.className = 'stat-card';
        card.style.setProperty('--cat-color', st.color);
        card.dataset.key = key;
        card.onclick = () => toggleCategory(key);
        card.innerHTML = '<div class="stat-num">' + st.count + '</div><div class="stat-label">' + st.icon + ' ' + st.label + '</div>';
        statGrid.appendChild(card);
    });
    
    // 分析面板
    CATEGORY_KEYS.forEach(key => {
        const st = DATA.stats[key];
        const cat = CATEGORIES[key];
        const panel = document.createElement('div');
        panel.className = 'analysis-panel';
        panel.id = 'panel_' + key;
        
        const analysis = getAnalysis(key);
        let itemsHtml = analysis.items.map(it => '<div class="analysis-item">' + it + '</div>').join('');
        let tagsHtml = analysis.tags.map(t => '<span class="analysis-tag" style="background:' + cat.color + '80">' + t + '</span>').join(' ');
        
        panel.innerHTML = '<h3 style="color:' + cat.color + '">' + cat.icon + ' 现状分析</h3>' +
            itemsHtml +
            '<div style="margin-top:8px;">' + tagsHtml + '</div>' +
            '<div style="margin-top:8px;font-size:12px;color:#8899bb">服务半径: ' + (cat.radius >= 1000 ? (cat.radius/1000)+'km' : cat.radius+'m') + '</div>';
        panels.appendChild(panel);
    });
    
    // 默认选中第一个
    setTimeout(() => toggleCategory(CATEGORY_KEYS[0]), 100);
}

function getAnalysis(key) {
    const analysis = {
        education: {
            items: ["周边高校3所（中南/湖大/师大），师生超20万人", "片区内：无高等院校，无中小学校", "现有：零星民办幼儿园 + 图书馆", "问题：内部缺乏优质基础教育资源"],
            tags: ["建议引入九年一贯制学校", "利用高校资源建设研学基地"]
        },
        medical: {
            items: ["周边医院：湘雅三医院、省人民医院等（2-3km）", "片区内：无综合性医疗机构", "现有：社区卫生服务站 + 药店零星分布", "问题：日常就医不便，应急医疗缺失"],
            tags: ["建议建设社区卫生服务中心", "增设智慧医疗站"]
        },
        commercial: {
            items: ["沿麻园路、后湖路分布为主", "餐饮：小型餐馆+夜市摊点，档次偏低", "购物：便利店+小超市，缺乏品质超市", "金融：银行网点缺失", "问题：业态单一，品质不高"],
            tags: ["引入品牌商业", "打造特色商业街区"]
        },
        transport: {
            items: ["地铁4号线阜埠河站距片区约500m", "公交：麻园路/阜埠河路沿线多站点", "内部道路：宽7-12m，部分断头路", "停车：公共车位严重不足", "慢行：环湖绿道已建但存在断点"],
            tags: ["打通断头路", "建设公共停车场", "贯通慢行系统"]
        },
        culture: {
            items: ["文化：后湖设计创意园内艺术馆若干，规模偏小", "体育：篮球场/羽毛球场零星分布", "公共空间：环湖绿道+小广场，设施陈旧", "问题：缺乏标志性文化建筑"],
            tags: ["建设标志性文化设施", "增设全龄友好体育场地"]
        }
    };
    return analysis[key] || {items:["数据整理中..."], tags:[""]};
}

function buildMapLayers() {
    markerLayer = L.layerGroup().addTo(map);
    
    CATEGORY_KEYS.forEach(key => {
        const features = DATA.features[key] || [];
        const cat = CATEGORIES[key];
        const markers = [];
        
        features.forEach(f => {
            const p = f.properties;
            const coords = f.geometry.coordinates;
            const icon = L.divIcon({
                html: '<div style="width:10px;height:10px;background:' + p.color + ';border-radius:50%;border:2px solid #fff;opacity:0.85;"></div>',
                iconSize: [14, 14],
                iconAnchor: [7, 7],
                className: ''
            });
            
            const m = L.marker([coords[1], coords[0]], {icon}).bindPopup(
                '<b style="color:' + p.color + '">' + p.name + '</b><br>' +
                '<span>类型: ' + p.type_label + '</span><br>' +
                '<span style="color:#8899bb">' + p.category + '</span>'
            );
            markers.push(m);
        });
        
        markersByCategory[key] = markers;
    });
}

function toggleCategory(key) {
    // 如果点击的是当前已选中的，取消选中
    if (activeCategory === key) {
        activeCategory = null;
    } else {
        activeCategory = key;
    }
    updateView();
}

function toggleAll() {
    activeCategory = null;
    updateView();
}

function updateView() {
    // 更新顶部按钮
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === activeCategory);
        if (btn.dataset.key === activeCategory) {
            btn.style.background = CATEGORIES[activeCategory].color;
        } else {
            btn.style.background = 'transparent';
        }
    });
    
    // 更新统计卡片
    document.querySelectorAll('.stat-card').forEach(card => {
        card.classList.toggle('active', card.dataset.key === activeCategory);
    });
    
    // 更新分析面板
    document.querySelectorAll('.analysis-panel').forEach(p => p.classList.remove('active'));
    if (activeCategory) {
        const panel = document.getElementById('panel_' + activeCategory);
        if (panel) panel.classList.add('active');
    }
    
    // 更新地图标记
    markerLayer.clearLayers();
    if (activeCategory) {
        (markersByCategory[activeCategory] || []).forEach(m => markerLayer.addLayer(m));
    } else {
        CATEGORY_KEYS.forEach(key => {
            (markersByCategory[key] || []).forEach(m => markerLayer.addLayer(m));
        });
    }
    
    // 更新服务半径
    updateRadius();
    
    // 更新设施列表
    updateList();
    updateLegend();
}

function updateList() {
    const list = document.getElementById('facilityList');
    const keys = activeCategory ? [activeCategory] : CATEGORY_KEYS;
    let html = '';
    
    keys.forEach(key => {
        const items = DATA.list_items[key] || [];
        const cat = CATEGORIES[key];
        items.forEach(item => {
            html += '<div class="facility-item" onclick="flyTo(' + item.lat + ',' + item.lon + ')">' +
                '<span class="facility-dot" style="background:' + cat.color + '"></span>' +
                '<span class="facility-icon">' + cat.icon + '</span>' +
                '<span>' + item.name + '</span>' +
                '<span class="facility-type">' + item.type_label + '</span>' +
                '</div>';
        });
    });
    
    list.innerHTML = html || '<div style="text-align:center;padding:20px;color:#8899bb;font-size:13px">暂无该类别设施数据</div>';
}

function updateLegend() {
    // 清除旧图例
    const old = document.querySelector('.leaflet-control-container .map-legend');
    if (old) old.remove();
    
    const legend = L.control({position: 'bottomleft'});
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'map-legend');
        const keys = activeCategory ? [activeCategory] : CATEGORY_KEYS;
        const html = '<b>' + (activeCategory ? CATEGORIES[activeCategory].icon + ' ' + CATEGORIES[activeCategory].label : '全部设施') + '</b>' +
            keys.map(k => {
                const c = CATEGORIES[k];
                const cnt = DATA.stats[k].count;
                return '<div class="legend-row"><span class="legend-dot" style="background:' + c.color + '"></span>' +
                    c.icon + ' ' + c.label + ' <span style="color:#8899bb;margin-left:auto">' + cnt + '个</span></div>';
            }).join('');
        div.innerHTML = html;
        return div;
    };
    legend.addTo(map);
}

function toggleRadius() {
    showRadius = !showRadius;
    document.getElementById('radiusBtn').textContent = showRadius ? '隐藏服务半径' : '显示服务半径';
    updateRadius();
}

function updateRadius() {
    // 清除旧圆
    radiusLayers.forEach(l => map.removeLayer(l));
    radiusLayers = [];
    if (!showRadius) return;
    
    const keys = activeCategory ? [activeCategory] : CATEGORY_KEYS;
    keys.forEach(key => {
        const cat = CATEGORIES[key];
        const features = DATA.features[key] || [];
        const used = new Set();
        features.forEach(f => {
            const coords = f.geometry.coordinates;
            const key = Math.round(coords[0]*100) + ',' + Math.round(coords[1]*100);
            if (used.has(key)) return;
            used.add(key);
            
            const circle = L.circle([coords[1], coords[0]], {
                radius: cat.radius,
                color: cat.color,
                fillColor: cat.color,
                fillOpacity: 0.08,
                weight: 1,
                opacity: 0.3,
                dashArray: '4,4'
            });
            radiusLayers.push(circle);
            map.addLayer(circle);
        });
    });
}

function flyTo(lat, lng) {
    map.flyTo([lat, lng], 17, {duration: 0.8});
}

// 启动
init();
</script>
